<section class="max-w-3xl mx-auto px-4 py-16">
    <div class="bg-white p-8 md:p-12 rounded-2xl shadow-lg">
        <h2 class="text-3xl font-bold mb-2">Cultural Event Registration</h2>
        <p class="text-slate-500 mb-8 border-b pb-4">Participate in Ugadi 2026 performances.</p>

        <form class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold mb-2">Full Name</label>
                    <input type="text" class="w-full p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Enter name">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Performance Type</label>
                    <select class="w-full p-3 bg-slate-50 border rounded-lg">
                        <option>Classical Dance</option>
                        <option>Tollywood Medley</option>
                        <option>Singing</option>
                        <option>Skit/Drama</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">Number of Participants</label>
                <input type="number" class="w-full p-3 bg-slate-50 border rounded-lg" value="1">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">Duration (Minutes)</label>
                <input type="text" class="w-full p-3 bg-slate-50 border rounded-lg" placeholder="e.g. 5-7 mins">
            </div>

            <button type="submit" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-orange-200 transition">Submit Registration</button>
            <a href="index.html" class="block text-center text-sm text-slate-500 hover:text-orange-600 mt-4">Return Home</a>
        </form>
    </div>
</section>
